name: BabygearRegistry
options:
  bundleIdPrefix: com.shimondeitel.babygearregistry
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BabygearRegistry:
    type: application
    platform: iOS
    sources:
      - path: BabygearRegistry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babygearregistry
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BabygearRegistry/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabygearRegistryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabygearRegistryTests
      - path: BabygearRegistry.storekit
    dependencies:
      - target: BabygearRegistry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babygearregistry.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabygearRegistryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabygearRegistryUITests
    dependencies:
      - target: BabygearRegistry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babygearregistry.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BabygearRegistry:
    build:
      targets:
        BabygearRegistry: all
        BabygearRegistryTests: [test]
        BabygearRegistryUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BabygearRegistry.storekit
    test:
      config: Debug
      storeKitConfiguration: BabygearRegistry.storekit
      targets:
        - BabygearRegistryTests
        - BabygearRegistryUITests
    archive:
      config: Release
